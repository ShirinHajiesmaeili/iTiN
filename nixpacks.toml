[phases.setup]
nixpkgs = ['nodejs']

[phases.install]
cmds = [
  'cd Client && npm install',
  'cd Server && npm install'
]

[phases.build]
cmds = [
  'cd Client && npm run build',
  'cp -r Client/build Server/public'  # or adjust based on how your backend serves static files
]

[start]
cmd = 'cd Server && npm start'
